{{define "admin_content"}}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Clientes</h1>
    <a href="/admin/dashboard" class="btn btn-outline-dark rounded-0">Volver al resumen</a>
</div>

<div class="card shadow-sm rounded-0 border-0">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .Usuarios}}
                    <tr>
                        <td>{{.ID}}</td>
                        <td>{{.Nombre}} {{.Apellido}}</td>
                        <td>{{.Email}}</td>
                        <td><span class="badge text-bg-light border rounded-0">{{.Rol}}</span></td>
                        <td class="text-end">
                            <form action="/admin/usuarios/rol?id={{.ID}}" method="POST" class="d-inline-flex gap-2 justify-content-end">
                                <select name="rol" class="form-select form-select-sm rounded-0 admin-role-select">
                                    <option value="cliente" {{if eq .Rol "cliente"}}selected{{end}}>cliente</option>
                                    <option value="admin" {{if eq .Rol "admin"}}selected{{end}}>admin</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-outline-dark rounded-0">Cambiar</button>
                            </form>
                        </td>
                    </tr>
                    {{else}}
                    <tr>
                        <td colspan="5" class="text-center text-muted py-4">No hay usuarios registrados.</td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</div>
{{end}}
