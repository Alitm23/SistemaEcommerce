{{define "admin_base"}}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="d-flex admin-shell">
        <nav class="sidebar">
            <h4 class="text-center py-4 admin-brand">JOYAS ARTESANALES</h4>
            <a href="/admin/dashboard" class="{{if eq .Active "dashboard"}}active-link{{end}}">Resumen</a>
            <a href="/admin/productos" class="{{if eq .Active "productos"}}active-link{{end}}">Inventario</a>
            <a href="/admin/ordenes" class="{{if eq .Active "ordenes"}}active-link{{end}}">Ordenes</a>
            <a href="/admin/usuarios" class="{{if eq .Active "usuarios"}}active-link{{end}}">Clientes</a>
            <hr>
            <a href="/" class="text-danger">Volver a la Tienda</a>
        </nav>

        <main class="flex-grow-1 p-5 admin-main">
            {{block "admin_content" .}}
            {{end}}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{end}}
